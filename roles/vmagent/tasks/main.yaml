---
- name: Create compose dir
  ansible.builtin.file:
    path: "{{ dir.ansible }}/vmagent"
    state: directory
    mode: 0755
  tags: vmagent
- name: Create data dir
  ansible.builtin.file:
    path: "{{ dir.data }}/vmagent"
    state: directory
    owner: '10001'
    mode: 0700
  tags: vmagent
- name: Make config folder
  ansible.builtin.file:
    path: "{{ dir.ansible }}/vmagent/config"
    state: directory
    mode: 0755
  tags: vmagent
- name: Make extended config folder
  ansible.builtin.file:
    path: "{{ dir.ansible }}/vmagent/config/conf.d"
    state: directory
    mode: 0755
  tags: vmagent

- name: Read password
  tags: vmagent
  shell: |
    cat {{ dir.ansible }}/vmagent/config/password
  register: pwd
  ignore_errors: true

- name: Set password fact
  tags: vmagent
  set_fact:
    pwd: "{{ pwd.stdout }}"
  when: pwd is defined

- name: Generate password
  tags: vmagent
  set_fact:
    pwd: "{{ lookup('ansible.builtin.password', '/dev/null', length=24, chars=['ascii_letters', 'digits']) }}"
  when: not pwd|default(None)

- name: Write password
  copy:
    dest: "{{ dir.ansible }}/vmagent/config/password"
    content: "{{ pwd }}"
    group: root
    owner: root
    mode: 0550
  tags: vmagent
  notify:
    - restart vmagent

- name: Move compose files
  ansible.builtin.template:
    src: docker-compose.yml
    dest: "{{ dir.ansible }}/vmagent/docker-compose.yml"
    mode: 0755
  tags: vmagent
  notify:
    - restart vmagent
- name: Move config
  ansible.builtin.template:
    src: config.yaml
    dest: "{{ dir.ansible }}/vmagent/config/config.yml"
    mode: 0755
  tags: vmagent
  notify:
    - restart vmagent

- name: Clear password
  set_fact:
    pwd: ''
  tags: vmagent

- name: Start vmagent
  community.docker.docker_compose_v2:
    project_src: "{{ dir.ansible }}/vmagent"
    state: present
  tags: vmagent

- name: Make sure handlers are flushed immediately
  ansible.builtin.meta: flush_handlers
  tags: vmagent
