{% if grafana.networks is defined and grafana.networks|length > 0 %}
networks:
{% for net in grafana.networks %}
  "{{ net }}":
    name: "{{ net }}"
    external: true
{% endfor %}
{% endif %}
services:
  grafana:
    image: "{{ grafana.image }}:{{ grafana.version }}"
    restart: always
    environment:
      VIRTUAL_HOST: "{{ grafana.host }}"
      VIRTUAL_PORT: 3000
      LETSENCRYPT_HOST: "{{ grafana.host }}"
      GF_SECURITY_ADMIN_PASSWORD__FILE: "/run/secrets/admin_password"
    volumes:
      - "{{ dir.data }}/grafana:/var/lib/grafana"
    secrets:
      - admin_password
{% if grafana.networks is defined and grafana.networks|length > 0 %}
    networks:
{% for net in grafana.networks %}
      - "{{ net }}"
{% endfor %}
{% endif %}
secrets:
   admin_password:
     file: admin_password.txt