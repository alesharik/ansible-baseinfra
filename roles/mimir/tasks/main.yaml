---
- name: Create compose dir
  ansible.builtin.file:
    path: "{{ dir.ansible }}/mimir"
    state: directory
    mode: 0755
  tags: mimir
- name: Create data dir
  ansible.builtin.file:
    path: "{{ dir.data }}/mimir"
    state: directory
    mode: 0755
    owner: '10001'
  tags: mimir
- name: Move compose files
  ansible.builtin.template:
    src: docker-compose.yml
    dest: "{{ dir.ansible }}/mimir/docker-compose.yml"
    mode: 0755
  tags: mimir
  notify:
    - restart mimir
- name: Make config folder
  ansible.builtin.file:
    path: "{{ dir.ansible }}/mimir/config"
    state: directory
    mode: 0755
  tags: mimir
- name: Move config
  ansible.builtin.template:
    src: config.yaml
    dest: "{{ dir.ansible }}/mimir/config/config.yaml"
    mode: 0755
  tags: mimir
  notify:
    - restart mimir

- name: Start mimir
  community.docker.docker_compose_v2:
    project_src: "{{ dir.ansible }}/mimir"
    state: present
  tags: mimir

- name: Make sure handlers are flushed immediately
  ansible.builtin.meta: flush_handlers
  tags: mimir
